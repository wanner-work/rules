name: Publish on npmjs.org

on:
  push:
    tags:
      - '@wanner.work/oxlint-rules-v*'
      - '@wanner.work/oxfmt-rules-v*'

permissions:
  id-token: write
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build & publish
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
        with:
          version: 11

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint, test, and build
        run: |
          pnpm --filter "@wanner.work/*" run build
          pnpm --filter "@wanner.work/*" run lint
          pnpm --filter "@wanner.work/*" run check

      - name: Verify versions match tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          for pkg in packages/*/package.json; do
            name=$(node -e "console.log(require('./$pkg').name)")
            echo "$name"
          done

      - name: Publish
        run: pnpm publish -r --filter "${{ github.ref_name }}" --no-git-checks --provenance --access public --report-summary
